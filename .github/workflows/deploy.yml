yaml
name: 自动部署

on:
  push:
    branches: [ main ]   # 你的主分支名

# 给 GITHUB_TOKEN 写权限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 安装依赖
        run: npm install

      - name: 构建
        run: npm run build

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist   # 默认输出目录

      - name: 部署到 Pages
        id: deployment
        uses: actions/deploy-pages@v4
